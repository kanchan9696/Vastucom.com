<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#4e73df,#1cc88a);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family: Arial, sans-serif;
        }

        .login-box{
            width:400px;
            background:#fff;
            padding:35px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        .login-title{
            text-align:center;
            margin-bottom:25px;
            font-weight:bold;
            color:#333;
        }

        .form-control{
            height:45px;
        }

        .btn-login{
            background:#4e73df;
            color:#fff;
            height:45px;
            width:100%;
            border:none;
        }

        .btn-login:hover{
            background:#2e59d9;
        }

        .logo{
            text-align:center;
            margin-bottom:15px;
        }

        .logo img{
            width:80px;
        }

        .forgot-link{
            text-align:right;
            margin-top:10px;
        }
    </style>
</head>
<body>

<div class="login-box">

    <div class="logo">
        <img src="logo.png" alt="Logo">
    </div>

    <h3 class="login-title">Login Page</h3>

   

    <form method="post">
        <div class="mb-3">
            <label>Username
				  <span style="color:red;">*</span></label>
            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Enter Username"
                   required>
        </div>

        <div class="mb-3">
            <label>Password <span style="color:red;">*</span></label>
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Enter Password"
                   required>
        </div>

        <button type="submit"
                name="login"
                class="btn btn-login">
            Sign In
        </button>

        <div class="forgot-link">
            <a href="#">Forgot Password?</a>
        </div>
    </form>

</div>

</body>
</html>
